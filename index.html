<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawrence's Poker Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#111827;
padding:20px;
border-radius:18px;
margin-bottom:24px;
border:1px solid #334155;
}

h1,h2{
margin-top:0;
}

.form-row{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

input{
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.calendar-controls{
display:flex;
justify-content:center;
align-items:center;
gap:14px;
margin-bottom:18px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day-name{
text-align:center;
font-weight:bold;
padding:10px;
color:#94a3b8;
}

.calendar-day{
background:#1e293b;
border:1px solid #334155;
border-radius:14px;
min-height:110px;
padding:8px;
cursor:pointer;
transition:.15s ease;
overflow:hidden;
}

.calendar-day:hover{
transform:translateY(-2px);
}

.empty{
visibility:hidden;
}

.today{
outline:2px solid #60a5fa;
}

.profit-day{
background:rgba(34,197,94,.18);
border:1px solid #22c55e;
}

.loss-day{
background:rgba(239,68,68,.18);
border:1px solid #ef4444;
}

.calendar-date{
font-weight:bold;
margin-bottom:6px;
}

.session-marker{
background:linear-gradient(135deg,#334155,#475569);
padding:6px 8px;
border-radius:8px;
font-size:11px;
margin-bottom:5px;
border:1px solid rgba(255,255,255,.08);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:#111827;
padding:24px;
border-radius:18px;
width:420px;
max-width:90%;
border:1px solid #334155;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

.profit{
color:#22c55e;
font-weight:bold;
}

.loss{
color:#ef4444;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div style="
display:flex;
gap:12px;
margin-bottom:20px;
">

<button onclick="showCalendarPage()" id="calendarTab">
Calendar
</button>

<button onclick="showSessionsPage()" id="sessionsTab">
Full Sessions
</button>

</div>

<div id="calendarPage">


<div class="card">
<h1>♠ Lawrence's Poker Tracker</h1>

<div class="form-row">
<input type="date" id="date">
<input type="text" id="type" placeholder="Type">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="buyIn" placeholder="Buy-In">
<input type="number" id="buyOut" placeholder="Buy-Out">
<button onclick="addSession()">Add Session</button>
</div>
</div>


<div class="card">

<h2>Poker Stats</h2>

<div id="statsGrid" style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
">

<div style="background:#1e293b;padding:14px;border-radius:12px;">
<div style="color:#94a3b8;">Total Profit</div>
<div id="totalProfit" style="font-size:22px;font-weight:bold;">$0.00</div>
</div>

<div style="background:#1e293b;padding:14px;border-radius:12px;">
<div style="color:#94a3b8;">Winning Sessions</div>
<div id="winningSessions" style="font-size:22px;font-weight:bold;">0</div>
</div>

<div style="background:#1e293b;padding:14px;border-radius:12px;">
<div style="color:#94a3b8;">Losing Sessions</div>
<div id="losingSessions" style="font-size:22px;font-weight:bold;">0</div>
</div>

<div style="background:#1e293b;padding:14px;border-radius:12px;">
<div style="color:#94a3b8;">Total Hours</div>
<div id="totalHours" style="font-size:22px;font-weight:bold;">0</div>
</div>

<div style="background:#1e293b;padding:14px;border-radius:12px;">
<div style="color:#94a3b8;">$ / Hour</div>
<div id="dollarsPerHour" style="font-size:22px;font-weight:bold;">$0.00</div>
</div>

</div>

</div>


<div class="card">

<div class="calendar-controls">
<button onclick="changeMonth(-1)">◀ Previous</button>

<h2 id="monthLabel"></h2>

<button onclick="changeMonth(1)">Next ▶</button>
</div>

<div id="calendar"></div>

</div>

</div>

<div id="sessionsPage" style="display:none;">

<div class="card">
<h2>All Poker Sessions</h2>
<div id="allSessionsList"></div>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2 id="modalTitle"></h2>

<div id="modalBody"></div>

</div>
</div>

<script>

const SUPABASE_URL =
"https://miawufyzrohndqnlvlea.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pYXd1Znl6cm9obmRxbmx2bGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1ODU3MDksImV4cCI6MjA5NTE2MTcwOX0.wa12xK9Q1x_yrSPpFf0a1KIq3oQkDOX_CTIKZVMKJXM";

const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

let sessions = [];

let currentDate = new Date();

async function loadSessions(){

const { data, error } =
await client
.from("sessions")
.select("*");

if(error){
console.error(error);
return;
}

sessions = data || [];

renderCalendar();
renderSessions();
updateStats();
}

async function addSession(){

const session = {

session_date:
document.getElementById("date").value,

session_type:
document.getElementById("type").value,

hours:
Number(document.getElementById("hours").value),

buy_in:
Number(document.getElementById("buyIn").value),

buy_out:
Number(document.getElementById("buyOut").value)

};

if(!session.session_date || !session.session_type){
alert("Please fill out the fields");
return;
}

const { error } =
await client
.from("sessions")
.insert([session]);

if(error){
console.error(error);
alert("Failed to add session");
return;
}

loadSessions();
}

function changeMonth(direction){

currentDate.setMonth(
currentDate.getMonth() + direction
);

renderCalendar();
renderSessions();
updateStats();
}


function updateStats(){

let totalProfit = 0;
let totalHours = 0;
let winning = 0;
let losing = 0;

sessions.forEach(session => {

const profit =
Number(session.buy_out) -
Number(session.buy_in);

totalProfit += profit;

totalHours += Number(session.hours || 0);

if(profit >= 0){
winning++;
}else{
losing++;
}

});

const dollarsPerHour =
totalHours > 0
? totalProfit / totalHours
: 0;

document.getElementById("totalProfit").textContent =
`$${totalProfit.toFixed(2)}`;

document.getElementById("winningSessions").textContent =
winning;

document.getElementById("losingSessions").textContent =
losing;

document.getElementById("totalHours").textContent =
totalHours.toFixed(1);

document.getElementById("dollarsPerHour").textContent =
`$${dollarsPerHour.toFixed(2)}`;

}


function renderCalendar(){

const year =
currentDate.getFullYear();

const month =
currentDate.getMonth();

const firstDay =
new Date(year, month, 1);

const lastDay =
new Date(year, month + 1, 0);

const startDay =
firstDay.getDay();

const monthName =
firstDay.toLocaleString(
"default",
{month:"long"}
);

document.getElementById("monthLabel").textContent =
`${monthName} ${year}`;

let html = `
<div class="calendar-grid">

<div class="day-name">Sun</div>
<div class="day-name">Mon</div>
<div class="day-name">Tue</div>
<div class="day-name">Wed</div>
<div class="day-name">Thu</div>
<div class="day-name">Fri</div>
<div class="day-name">Sat</div>
`;

for(let i=0;i<startDay;i++){
html += `<div class="calendar-day empty"></div>`;
}

for(let day=1; day<=lastDay.getDate(); day++){

const formattedDate =
`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

const daySessions =
sessions.filter(
s => s.session_date === formattedDate
);

const totalProfit =
daySessions.reduce((sum, session)=>{

return sum + (
Number(session.buy_out) -
Number(session.buy_in)
);

},0);

let profitClass = "";

if(daySessions.length > 0){

profitClass =
totalProfit >= 0
? "profit-day"
: "loss-day";
}

const todayDate = new Date();

const today =
todayDate.getDate() === day &&
todayDate.getMonth() === month &&
todayDate.getFullYear() === year;

html += `
<div
class="calendar-day ${today ? 'today' : ''} ${profitClass}"
onclick="showSessionPopup('${formattedDate}')"
>

<div class="calendar-date">${day}</div>

${daySessions.map(session => {

const profit =
Number(session.buy_out) -
Number(session.buy_in);

return `
<div class="session-marker">
${session.session_type}<br>
${profit >= 0 ? '+' : '-'}$${Math.abs(profit)}
</div>
`;

}).join("")}

</div>
`;
}

html += `</div>`;

document.getElementById("calendar").innerHTML =
html;
}

function showSessionPopup(date){

const daySessions =
sessions.filter(
s => s.session_date === date
);

if(daySessions.length === 0){
return;
}

document.getElementById("modalTitle").textContent =
date;

let html = "";

daySessions.forEach(session => {

const profit =
Number(session.buy_out) -
Number(session.buy_in);

html += `
<div style="
background:#1e293b;
padding:14px;
border-radius:12px;
margin-bottom:12px;
">

<h3>${session.session_type}</h3>

<p>Hours: ${session.hours}</p>

<p>Buy-In: $${Number(session.buy_in).toFixed(2)}</p>

<p>Buy-Out: $${Number(session.buy_out).toFixed(2)}</p>

<p class="${profit >= 0 ? 'profit' : 'loss'}">
Profit: $${profit.toFixed(2)}
</p>

</div>
`;
});

document.getElementById("modalBody").innerHTML =
html;

document.getElementById("modal").style.display =
"flex";
}


function renderSessions(){

const container =
document.getElementById("allSessionsList");

if(!container){
return;
}

if(sessions.length === 0){

container.innerHTML =
"<p>No sessions recorded.</p>";

return;
}

const sorted =
[...sessions].sort((a,b)=>
new Date(b.session_date) -
new Date(a.session_date)
);

container.innerHTML = sorted.map(session => {

const profit =
Number(session.buy_out) -
Number(session.buy_in);

return `

<div style="
background:#1e293b;
padding:16px;
border-radius:14px;
margin-bottom:12px;
border:1px solid #334155;
">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
">

<h3 style="margin:0;">
${session.session_type}
</h3>

<div>
${session.session_date}
</div>

</div>

<div style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
">

<div>
<div class="label">Hours</div>
<div>${session.hours}</div>
</div>

<div>
<div class="label">Buy-In</div>
<div>$${Number(session.buy_in).toFixed(2)}</div>
</div>

<div>
<div class="label">Buy-Out</div>
<div>$${Number(session.buy_out).toFixed(2)}</div>
</div>

<div>
<div class="label">Profit</div>

<div class="${profit >= 0 ? 'profit' : 'loss'}">
$${profit.toFixed(2)}
</div>

</div>

</div>

</div>

`;

}).join("");

}

function showCalendarPage(){

document.getElementById("calendarPage").style.display =
"block";

document.getElementById("sessionsPage").style.display =
"none";
}

function showSessionsPage(){

document.getElementById("calendarPage").style.display =
"none";

document.getElementById("sessionsPage").style.display =
"block";

renderSessions();
}


function closeModal(){

document.getElementById("modal").style.display =
"none";
}

window.onclick = function(event){

const modal =
document.getElementById("modal");

if(event.target === modal){
closeModal();
}

};

loadSessions();

</script>

</div>
</body>
</html>
