
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawrence's Poker Tracker</title>

<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:rgba(31,41,55,.96);
padding:24px;
border-radius:16px;
margin-bottom:24px;
box-shadow:0 8px 30px rgba(0,0,0,.25);
}

.form-grid,.edit-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:14px;
align-items:end;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
margin-bottom:6px;
font-size:14px;
color:#cbd5e1;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
box-sizing:border-box;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
}

.secondary-btn{background:#475569;}

.delete-btn{
background:#dc2626;
padding:6px 10px;
font-size:12px;
}

.edit-btn{
background:#f59e0b;
padding:6px 10px;
font-size:12px;
}

.save-btn{
background:#16a34a;
}

.cancel-btn{
background:#64748b;
}

.toolbar{
display:flex;
gap:12px;
margin-top:14px;
flex-wrap:wrap;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
}

.stat-box{
background:rgba(15,23,42,.95);
border:1px solid #334155;
border-radius:14px;
padding:18px;
text-align:center;
min-width:0;
}

.session-card,.hand-card{
background:rgba(15,23,42,.95);
border:1px solid #334155;
border-radius:14px;
padding:18px;
}

.stat-title{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.stat-value{
font-size:28px;
font-weight:bold;
word-break:break-word;
}

.profit{color:#22c55e;}
.loss{color:#ef4444;}

.session-list{
display:flex;
flex-direction:column;
gap:12px;
}

.session-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.session-actions{
display:flex;
gap:8px;
}

.session-info{
display:flex;
flex-wrap:wrap;
gap:18px;
margin-top:10px;
}

.info-box{
background:rgba(30,41,59,.95);
padding:10px 14px;
border-radius:10px;
}

.label{
color:#94a3b8;
font-size:12px;
}

.hand-controls{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.hand-link{
color:#93c5fd;
}

.empty{
text-align:center;
color:#94a3b8;
padding:20px 0;
}

.hidden-input{
display:none;
}

.edit-panel{
margin-top:18px;
padding-top:18px;
border-top:1px solid #334155;
}

@media (max-width:1100px){
.stats-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media (max-width:600px){
.stats-grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>♠ Lawrence's Poker Tracker</h1>

<form id="sessionForm">

<div class="form-grid">

<div class="form-group">
<label>Date</label>
<input type="date" id="date" required>
</div>

<div class="form-group">
<label>Type</label>
<input type="text" id="type" required>
</div>

<div class="form-group">
<label>Hours</label>
<input type="number" step="0.1" id="hours" required>
</div>

<div class="form-group">
<label>Buy-In</label>
<input type="number" id="buyIn" required>
</div>

<div class="form-group">
<label>Buy-Out</label>
<input type="number" id="buyOut" required>
</div>

<div class="form-group">
<button type="submit">Add Session</button>
</div>

</div>

</form>

<div class="toolbar">

<button class="secondary-btn" onclick="exportData()">
Export Data
</button>

<button class="secondary-btn" onclick="triggerImport()">
Import Data
</button>

<input type="file" id="importFile" class="hidden-input" accept=".json">

</div>

</div>

<div class="card">

<h2>Poker Stats</h2>

<div class="stats-grid">

<div class="stat-box">
<div class="stat-title">Total Net Profit</div>
<div id="totalProfit" class="stat-value">$0.00</div>
</div>

<div class="stat-box">
<div class="stat-title">Total Hours</div>
<div id="totalHours" class="stat-value">0 hrs</div>
</div>

<div class="stat-box">
<div class="stat-title">$ Per Hour</div>
<div id="dollarPerHour" class="stat-value">$0.00</div>
</div>

<div class="stat-box">
<div class="stat-title">Winning Sessions</div>
<div id="winningSessions" class="stat-value profit">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Losing Sessions</div>
<div id="losingSessions" class="stat-value loss">0</div>
</div>

</div>

</div>

<div class="card">

<h2>Poker Sessions</h2>

<div id="sessionsContainer" class="session-list"></div>

<p id="emptyText" class="empty">
No poker sessions yet.
</p>

</div>

<div class="card">

<h2>Hand Review Links</h2>

<div class="hand-controls">

<input type="text" id="globalHandName" placeholder="Hand name">

<input type="text" id="globalHandUrl" placeholder="Paste hand review URL">

<button onclick="addGlobalHand()">
Add Link
</button>

</div>

<div id="handsContainer"></div>

</div>

</div>

<script>

const SESSION_STORAGE_KEY="pokerSessions";
const HAND_STORAGE_KEY="pokerHandReviews";

let sessions=JSON.parse(localStorage.getItem(SESSION_STORAGE_KEY))||[];
let hands=JSON.parse(localStorage.getItem(HAND_STORAGE_KEY))||[];

function saveSessions(){
localStorage.setItem(SESSION_STORAGE_KEY,JSON.stringify(sessions));
}

function saveHands(){
localStorage.setItem(HAND_STORAGE_KEY,JSON.stringify(hands));
}

function updateStats(){

let totalProfit=0;
let totalHours=0;
let winningSessions=0;
let losingSessions=0;

sessions.forEach(session=>{

const profit=session.buyOut-session.buyIn;

totalProfit+=profit;
totalHours+=Number(session.hours||0);

if(profit>=0){
winningSessions++;
}else{
losingSessions++;
}

});

const dollarPerHour =
totalHours > 0 ? totalProfit / totalHours : 0;

document.getElementById("totalProfit").textContent=
`$${totalProfit.toFixed(2)}`;

document.getElementById("totalHours").textContent=
`${totalHours.toFixed(1)} hrs`;

document.getElementById("dollarPerHour").textContent=
`$${dollarPerHour.toFixed(2)}`;

document.getElementById("winningSessions").textContent=
winningSessions;

document.getElementById("losingSessions").textContent=
losingSessions;

}

function renderSessions(){

const container=document.getElementById("sessionsContainer");
const emptyText=document.getElementById("emptyText");

container.innerHTML="";

updateStats();

if(sessions.length===0){
emptyText.style.display="block";
return;
}

emptyText.style.display="none";

const sorted=[...sessions].sort(
(a,b)=>new Date(b.date)-new Date(a.date)
);

sorted.forEach(session=>{

const originalIndex=sessions.indexOf(session);

const profit=session.buyOut-session.buyIn;

const card=document.createElement("div");

card.className="session-card";

card.innerHTML=`

<div class="session-header">

<h3>${session.date}</h3>

<div class="session-actions">

<button
class="edit-btn"
onclick="toggleEdit(${originalIndex})"
>
Edit
</button>

<button
class="delete-btn"
onclick="deleteSession(${originalIndex})"
>
Delete
</button>

</div>

</div>

<div class="session-info">

<div class="info-box">
<div class="label">Type</div>
<div>${session.type}</div>
</div>

<div class="info-box">
<div class="label">Hours</div>
<div>${session.hours}</div>
</div>

<div class="info-box">
<div class="label">Buy-In</div>
<div>$${session.buyIn.toFixed(2)}</div>
</div>

<div class="info-box">
<div class="label">Buy-Out</div>
<div>$${session.buyOut.toFixed(2)}</div>
</div>

<div class="info-box">
<div class="label">Profit</div>
<div class="${profit>=0?'profit':'loss'}">
$${profit.toFixed(2)}
</div>
</div>

</div>

<div
id="editPanel-${originalIndex}"
class="edit-panel"
style="display:none;"
>

<div class="edit-grid">

<div class="form-group">
<label>Date</label>
<input type="date" id="edit-date-${originalIndex}" value="${session.date}">
</div>

<div class="form-group">
<label>Type</label>
<input type="text" id="edit-type-${originalIndex}" value="${session.type}">
</div>

<div class="form-group">
<label>Hours</label>
<input type="number" step="0.1" id="edit-hours-${originalIndex}" value="${session.hours}">
</div>

<div class="form-group">
<label>Buy-In</label>
<input type="number" id="edit-buyIn-${originalIndex}" value="${session.buyIn}">
</div>

<div class="form-group">
<label>Buy-Out</label>
<input type="number" id="edit-buyOut-${originalIndex}" value="${session.buyOut}">
</div>

<div class="form-group">

<button
class="save-btn"
onclick="saveEdit(${originalIndex})"
>
Save Changes
</button>

</div>

</div>

<div style="margin-top:12px;">
<button
class="cancel-btn"
onclick="toggleEdit(${originalIndex})"
>
Cancel
</button>
</div>

</div>
`;

container.appendChild(card);

});

}

function toggleEdit(index){

const panel=document.getElementById(`editPanel-${index}`);

if(panel.style.display==="none"){
panel.style.display="block";
}else{
panel.style.display="none";
}

}

function saveEdit(index){

sessions[index]={
date:document.getElementById(`edit-date-${index}`).value,
type:document.getElementById(`edit-type-${index}`).value,
hours:parseFloat(document.getElementById(`edit-hours-${index}`).value),
buyIn:parseFloat(document.getElementById(`edit-buyIn-${index}`).value),
buyOut:parseFloat(document.getElementById(`edit-buyOut-${index}`).value)
};

saveSessions();

renderSessions();

}

function deleteSession(index){

if(!confirm("Delete this poker session?")) return;

sessions.splice(index,1);

saveSessions();

renderSessions();

}

function renderHands(){

const container=document.getElementById("handsContainer");

container.innerHTML="";

if(hands.length===0){

container.innerHTML=
'<p class="empty">No hand review links added yet.</p>';

return;
}

hands.forEach((hand,index)=>{

const card=document.createElement("div");

card.className="hand-card";

card.innerHTML=`

<div>

<div><strong>${hand.name}</strong></div>

<a
class="hand-link"
href="${hand.url}"
target="_blank"
>
${hand.url}
</a>

</div>

<button
class="delete-btn"
onclick="deleteHand(${index})"
>
Delete
</button>
`;

container.appendChild(card);

});

}

function addGlobalHand(){

const handName=
document.getElementById("globalHandName").value.trim();

const handUrl=
document.getElementById("globalHandUrl").value.trim();

if(!handName||!handUrl){

alert("Please enter both a hand name and URL.");

return;
}

hands.push({
name:handName,
url:handUrl
});

saveHands();

renderHands();

document.getElementById("globalHandName").value="";
document.getElementById("globalHandUrl").value="";

}

function deleteHand(index){

hands.splice(index,1);

saveHands();

renderHands();

}

function exportData(){

const data={
sessions,
hands,
exportedAt:new Date().toISOString()
};

const blob=new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
);

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download=
"lawrence-poker-tracker-backup.json";

a.click();

URL.revokeObjectURL(url);

}

function triggerImport(){
document.getElementById("importFile").click();
}

document.getElementById("importFile")
.addEventListener("change",function(event){

const file=event.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

try{

const importedData=
JSON.parse(e.target.result);

sessions=importedData.sessions||[];
hands=importedData.hands||[];

saveSessions();
saveHands();

renderSessions();
renderHands();

alert("Data imported successfully.");

}catch{

alert("Invalid backup file.");

}

};

reader.readAsText(file);

});

document.getElementById("sessionForm")
.addEventListener("submit",function(e){

e.preventDefault();

const session={
date:document.getElementById("date").value,
type:document.getElementById("type").value,
hours:parseFloat(
document.getElementById("hours").value
),
buyIn:parseFloat(
document.getElementById("buyIn").value
),
buyOut:parseFloat(
document.getElementById("buyOut").value
)
};

sessions.push(session);

saveSessions();

renderSessions();

this.reset();

});

renderSessions();
renderHands();

</script>

</body>
</html>
