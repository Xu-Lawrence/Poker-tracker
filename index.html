<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawrence's Poker Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:rgba(31,41,55,.96);
padding:24px;
border-radius:16px;
margin-bottom:24px;
box-shadow:0 8px 30px rgba(0,0,0,.25);
}

.form-grid,.edit-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:14px;
align-items:end;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
margin-bottom:6px;
font-size:14px;
color:#cbd5e1;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
box-sizing:border-box;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
}

.secondary-btn{background:#475569;}

.delete-btn{
background:#dc2626;
padding:6px 10px;
font-size:12px;
}

.edit-btn{
background:#f59e0b;
padding:6px 10px;
font-size:12px;
}

.save-btn{
background:#16a34a;
}

.cancel-btn{
background:#64748b;
}

.toolbar{
display:flex;
gap:12px;
margin-top:14px;
flex-wrap:wrap;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
}

.stat-box{
background:rgba(15,23,42,.95);
border:1px solid #334155;
border-radius:14px;
padding:18px;
text-align:center;
}

.stat-title{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.stat-value{
font-size:28px;
font-weight:bold;
}

.profit{color:#22c55e;}
.loss{color:#ef4444;}

.session-card,.hand-card{
background:rgba(15,23,42,.95);
border:1px solid #334155;
border-radius:14px;
padding:18px;
margin-bottom:12px;
}

.session-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.session-actions{
display:flex;
gap:8px;
}

.session-info{
display:flex;
flex-wrap:wrap;
gap:18px;
margin-top:10px;
}

.info-box{
background:rgba(30,41,59,.95);
padding:10px 14px;
border-radius:10px;
}

.label{
color:#94a3b8;
font-size:12px;
}

.edit-panel{
margin-top:18px;
padding-top:18px;
border-top:1px solid #334155;
display:none;
}

.hand-controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:18px;
}

.hand-link{
color:#93c5fd;
}

@media (max-width:1100px){
.stats-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media (max-width:600px){
.stats-grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>♠ Lawrence's Poker Tracker</h1>

<form id="sessionForm">

<div class="form-grid">

<div class="form-group">
<label>Date</label>
<input type="date" id="date" required>
</div>

<div class="form-group">
<label>Type</label>
<input type="text" id="type" required>
</div>

<div class="form-group">
<label>Hours</label>
<input type="number" step="0.1" id="hours" required>
</div>

<div class="form-group">
<label>Buy-In</label>
<input type="number" id="buyIn" required>
</div>

<div class="form-group">
<label>Buy-Out</label>
<input type="number" id="buyOut" required>
</div>

<div class="form-group">
<button type="submit">Add Session</button>
</div>

</div>

</form>

</div>

<div class="card">

<h2>Poker Stats</h2>

<div class="stats-grid">

<div class="stat-box">
<div class="stat-title">Total Net Profit</div>
<div id="totalProfit" class="stat-value">$0.00</div>
</div>

<div class="stat-box">
<div class="stat-title">Total Hours</div>
<div id="totalHours" class="stat-value">0 hrs</div>
</div>

<div class="stat-box">
<div class="stat-title">$ Per Hour</div>
<div id="dollarPerHour" class="stat-value">$0.00</div>
</div>

<div class="stat-box">
<div class="stat-title">Winning Sessions</div>
<div id="winningSessions" class="stat-value profit">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Losing Sessions</div>
<div id="losingSessions" class="stat-value loss">0</div>
</div>

</div>

</div>

<div class="card">

<h2>Poker Sessions</h2>

<div id="sessionsContainer"></div>

</div>

<div class="card">

<h2>Hand Review Links</h2>

<div class="hand-controls">

<input type="text" id="globalHandName" placeholder="Hand name">

<input type="text" id="globalHandUrl" placeholder="Paste hand review URL">

<button onclick="addGlobalHand()">
Add Link
</button>

</div>

<div id="handsContainer"></div>

</div>

</div>

<script>

const SUPABASE_URL = "https://miawufyzrohndqnlvlea.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pYXd1Znl6cm9obmRxbmx2bGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1ODU3MDksImV4cCI6MjA5NTE2MTcwOX0.wa12xK9Q1x_yrSPpFf0a1KIq3oQkDOX_CTIKZVMKJXM";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let sessions = [];
let hands = [];

async function loadSessions() {

  const { data, error } = await supabase
    .from('sessions')
    .select('*')
    .order('session_date', { ascending: false });

  if(error){
    console.error(error);
    return;
  }

  sessions = data.map(session => ({
    id: session.id,
    date: session.session_date,
    type: session.session_type,
    hours: Number(session.hours),
    buyIn: Number(session.buy_in),
    buyOut: Number(session.buy_out)
  }));

  renderSessions();
}

async function loadHands(){

  const { data, error } = await supabase
    .from('hand_reviews')
    .select('*')
    .order('created_at', { ascending: false });

  if(error){
    console.error(error);
    return;
  }

  hands = data.map(hand => ({
    id: hand.id,
    name: hand.hand_name,
    url: hand.hand_url
  }));

  renderHands();
}

function updateStats(){

let totalProfit=0;
let totalHours=0;
let winningSessions=0;
let losingSessions=0;

sessions.forEach(session=>{

const profit=session.buyOut-session.buyIn;

totalProfit+=profit;
totalHours+=Number(session.hours||0);

if(profit>=0){
winningSessions++;
}else{
losingSessions++;
}

});

const dollarPerHour =
totalHours > 0 ? totalProfit / totalHours : 0;

document.getElementById("totalProfit").textContent=
`$${totalProfit.toFixed(2)}`;

document.getElementById("totalHours").textContent=
`${totalHours.toFixed(1)} hrs`;

document.getElementById("dollarPerHour").textContent=
`$${dollarPerHour.toFixed(2)}`;

document.getElementById("winningSessions").textContent=
winningSessions;

document.getElementById("losingSessions").textContent=
losingSessions;

}

function renderSessions(){

const container=document.getElementById("sessionsContainer");

container.innerHTML="";

updateStats();

sessions.forEach(session=>{

const profit=session.buyOut-session.buyIn;

const card=document.createElement("div");

card.className="session-card";

card.innerHTML=`

<div class="session-header">

<h3>${session.date}</h3>

<div class="session-actions">

<button
class="edit-btn"
onclick="toggleEdit(${session.id})"
>
Edit
</button>

<button
class="delete-btn"
onclick="deleteSession(${session.id})"
>
Delete
</button>

</div>

</div>

<div class="session-info">

<div class="info-box">
<div class="label">Type</div>
<div>${session.type}</div>
</div>

<div class="info-box">
<div class="label">Hours</div>
<div>${session.hours}</div>
</div>

<div class="info-box">
<div class="label">Buy-In</div>
<div>$${session.buyIn.toFixed(2)}</div>
</div>

<div class="info-box">
<div class="label">Buy-Out</div>
<div>$${session.buyOut.toFixed(2)}</div>
</div>

<div class="info-box">
<div class="label">Profit</div>
<div class="${profit>=0?'profit':'loss'}">
$${profit.toFixed(2)}
</div>
</div>

</div>

<div id="editPanel-${session.id}" class="edit-panel">

<div class="edit-grid">

<div class="form-group">
<label>Date</label>
<input type="date" id="edit-date-${session.id}" value="${session.date}">
</div>

<div class="form-group">
<label>Type</label>
<input type="text" id="edit-type-${session.id}" value="${session.type}">
</div>

<div class="form-group">
<label>Hours</label>
<input type="number" step="0.1" id="edit-hours-${session.id}" value="${session.hours}">
</div>

<div class="form-group">
<label>Buy-In</label>
<input type="number" id="edit-buyIn-${session.id}" value="${session.buyIn}">
</div>

<div class="form-group">
<label>Buy-Out</label>
<input type="number" id="edit-buyOut-${session.id}" value="${session.buyOut}">
</div>

<div class="form-group">
<button class="save-btn" onclick="saveEdit(${session.id})">
Save Changes
</button>
</div>

</div>

</div>
`;

container.appendChild(card);

});

}

function toggleEdit(id){

const panel=document.getElementById(`editPanel-${id}`);

panel.style.display =
panel.style.display === "block" ? "none" : "block";

}

async function saveEdit(id){

  const updatedSession = {
    session_date: document.getElementById(`edit-date-${id}`).value,
    session_type: document.getElementById(`edit-type-${id}`).value,
    hours: parseFloat(document.getElementById(`edit-hours-${id}`).value),
    buy_in: parseFloat(document.getElementById(`edit-buyIn-${id}`).value),
    buy_out: parseFloat(document.getElementById(`edit-buyOut-${id}`).value)
  };

  const { error } = await supabase
    .from('sessions')
    .update(updatedSession)
    .eq('id', id);

  if(error){
    console.error(error);
    return;
  }

  await loadSessions();
}

async function deleteSession(id){

  const { error } = await supabase
    .from('sessions')
    .delete()
    .eq('id', id);

  if(error){
    console.error(error);
    return;
  }

  await loadSessions();
}

function renderHands(){

const container=document.getElementById("handsContainer");

container.innerHTML="";

hands.forEach((hand)=>{

const card=document.createElement("div");

card.className="hand-card";

card.innerHTML=`

<div style="display:flex;justify-content:space-between;align-items:center;gap:16px;">

<div>
<div><strong>${hand.name}</strong></div>

<a
class="hand-link"
href="${hand.url}"
target="_blank"
>
${hand.url}
</a>
</div>

<button
class="delete-btn"
onclick="deleteHand(${hand.id})"
>
Delete
</button>

</div>
`;

container.appendChild(card);

});

}

async function addGlobalHand(){

  const handName =
    document.getElementById("globalHandName").value.trim();

  const handUrl =
    document.getElementById("globalHandUrl").value.trim();

  if(!handName || !handUrl){
    alert("Enter both a hand name and URL.");
    return;
  }

  const { error } = await supabase
    .from('hand_reviews')
    .insert({
      hand_name: handName,
      hand_url: handUrl
    });

  if(error){
    console.error(error);
    return;
  }

  document.getElementById("globalHandName").value = "";
  document.getElementById("globalHandUrl").value = "";

  await loadHands();
}

async function deleteHand(id){

  const { error } = await supabase
    .from('hand_reviews')
    .delete()
    .eq('id', id);

  if(error){
    console.error(error);
    return;
  }

  await loadHands();
}

document.getElementById("sessionForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const session={
date:document.getElementById("date").value,
type:document.getElementById("type").value,
hours:parseFloat(document.getElementById("hours").value),
buyIn:parseFloat(document.getElementById("buyIn").value),
buyOut:parseFloat(document.getElementById("buyOut").value)
};

  const { error } = await supabase
    .from('sessions')
    .insert({
      session_date: session.date,
      session_type: session.type,
      hours: session.hours,
      buy_in: session.buyIn,
      buy_out: session.buyOut
    });

  if(error){
    console.error(error);
    alert("Failed to save session.");
    return;
  }

  this.reset();

  await loadSessions();

});

loadSessions();
loadHands();

</script>

</body>
</html>
